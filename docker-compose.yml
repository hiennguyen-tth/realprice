version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 15 + PostGIS 3.3
  # ─────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: realprice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-realprice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realprice_secret}
      POSTGRES_DB: ${POSTGRES_DB:-realprice_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-realprice} -d ${POSTGRES_DB:-realprice_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - realprice_net

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: realprice_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realprice_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  realprice_net:
    driver: bridge
